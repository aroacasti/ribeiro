<!DOCTYPE html>
<html lang="gl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carta - Taberna O Ribeiro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background: #f5f0e8;
            color: #2d4a2b;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 20px 20px 10px 20px;
            margin-bottom: 15px;
        }

        .logo-img {
            max-width: 400px;
            width: 100%;
            height: auto;
            margin: 0 auto;
            display: block;
        }

        .categoria {
            background: #ffffff;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .categoria-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e8dcc8;
        }

        .categoria-icono {
            font-size: 2em;
            margin-right: 15px;
        }

        .categoria-nombre {
            font-size: 1.8em;
            color: #8b7355;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .categoria-descripcion {
            background: #f9f6f0;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.85em;
            color: #5a5a5a;
            border-left: 3px solid #4a6741;
            line-height: 1.5;
        }

        .producto {
            padding: 12px 0;
            margin-bottom: 12px;
            border-bottom: 1px solid #f0e8d8;
        }

        .producto:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        .producto-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 6px;
        }

        .producto-nombre {
            font-size: 1.15em;
            font-weight: bold;
            color: #4a6741;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .producto-precio {
            font-size: 1.15em;
            color: #4a6741;
            font-weight: bold;
            white-space: nowrap;
            margin-left: 15px;
        }

        .producto-descripcion {
            color: #666;
            font-size: 0.9em;
            line-height: 1.4;
            margin-bottom: 8px;
            font-style: italic;
        }

        .alergenos {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }

        .alergeno-tag {
            background: #e8dcc8;
            color: #5a5a5a;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.75em;
        }

        footer {
            text-align: center;
            padding: 30px 20px;
            margin-top: 40px;
            border-top: 2px solid #e8dcc8;
        }

        .footer-info {
            color: #666;
            font-size: 0.85em;
            margin-bottom: 15px;
        }

        .leyenda-alergenos {
            background: #f9f6f0;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
        }

        .leyenda-alergenos h3 {
            color: #4a6741;
            margin-bottom: 12px;
            font-size: 1.1em;
            text-align: center;
        }

        .leyenda-lista {
            font-size: 0.85em;
            color: #666;
            line-height: 1.8;
            text-align: center;
        }

        .social {
            font-size: 0.8em;
            color: #999;
            margin-top: 15px;
        }

        .logo-batifondo {
            max-width: 250px;
            width: 100%;
            height: auto;
            margin: 20px auto 15px auto;
            display: block;
            opacity: 0.8;
        }

        @media (max-width: 600px) {
            .logo-text {
                font-size: 2.2em;
            }

            h1 {
                font-size: 1.8em;
            }

            .categoria-nombre {
                font-size: 1.4em;
            }

            .producto-nombre {
                font-size: 1em;
            }

            .producto-precio {
                font-size: 1em;
            }
        }
    </style>
</head>

    "altramuces": "Altramuces",
    "moluscos": "Moluscos"
  }
};

        // Generar el menú
        const container = document.getElementById('menu-container');
        
        data.categorias.forEach(categoria => {
            const categoriaDiv = document.createElement('div');
            categoriaDiv.className = 'categoria';

            let headerHTML = `
                <div class="categoria-header">
                    ${categoria.icono ? `<span class="categoria-icono">${categoria.icono}</span>` : ''}
                    <h2 class="categoria-nombre">${categoria.nombre}</h2>
                </div>
            `;

            // Agregar descripción de categoría si existe
            if (categoria.descripcion_categoria) {
                headerHTML += `
                    <div class="categoria-descripcion">
                        ${categoria.descripcion_categoria}
                    </div>
                `;
            }

            let productosHTML = '';
            categoria.productos.forEach(producto => {
                // Solo mostrar productos activos
                if (producto.activo === false) {
                    return; // Saltar este producto
                }
                
                // Generar tags de alérgenos
                let alergenosHTML = '';
                if (producto.alergenos && producto.alergenos.length > 0) {
                    alergenosHTML = '<div class="alergenos">';
                    producto.alergenos.forEach(alergeno => {
                        if (data.alergenos_disponibles && data.alergenos_disponibles[alergeno]) {
                            alergenosHTML += `<span class="alergeno-tag">${data.alergenos_disponibles[alergeno]}</span>`;
                        }
                    });
                    alergenosHTML += '</div>';
                }

                productosHTML += `
                    <div class="producto">
                        <div class="producto-header">
                            <span class="producto-nombre">${producto.nombre}</span>
                            <span class="producto-precio">${producto.precio.toFixed(2)}€</span>
                        </div>
                        ${producto.descripcion ? `<p class="producto-descripcion">${producto.descripcion}</p>` : ''}
                        ${alergenosHTML}
                    </div>
                `;
            });

            categoriaDiv.innerHTML = headerHTML + productosHTML;
            container.appendChild(categoriaDiv);
        });
    </script>
</body>
</html>
